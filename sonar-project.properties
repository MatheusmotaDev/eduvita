# Must be unique in a given SonarQube instance
sonar.projectKey=eduvita-project
sonar.organization=SEU_NOME_DE_ORGANIZACAO_AQUI

# --- optional properties ---

# Name of the project (what will show up on SonarCloud dashboard)
sonar.projectName=EduVita - Indice de Vulnerabilidade Escolar
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
# This property is optional if sonar.modules is set. 
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclude specific folders from analysis
sonar.exclusions=**/node_modules/**, **/.next/**, **/public/**, **/*.css, tailwind.config.ts, postcss.config.mjs

# Tell SonarCloud we are using TypeScript
sonar.language=ts
